services:
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        PHP_MODE: production
    container_name: laravel_test_app_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/laravel-test-app
    depends_on:
      - mysql
      - httpd
      - minio
      - mailhog
    networks:
      - laravel_test_app_network

  httpd:
    build:
      context: .
      dockerfile: ./docker/httpd/Dockerfile
    container_name: laravel_test_app_httpd
    restart: unless-stopped
    volumes:
      - ./:/var/www/laravel-test-app
      - ./docker/httpd/vhosts.conf:/etc/apache2/sites-available/vhosts.conf
    depends_on:
      - mysql
      - minio
      - mailhog
    networks:
      - laravel_test_app_network

  mysql:
    image: mysql:8.0.36
    container_name: laravel_test_app_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_test_app
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - laravel_test_app_database:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    networks:
      - laravel_test_app_network

  minio:
    image: minio/minio:RELEASE.2022-11-11T03-44-20Z
    ports:
      - "9001:9001"
    container_name: laravel_test_app_minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=user
      - MINIO_ROOT_PASSWORD=password
    volumes:
      - "./storage/app/s3_data:/tmp/s3_data"
    command: server /tmp/s3_data --console-address ":9001"
    networks:
      - laravel_test_app_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: laravel_test_app_mailhog
    restart: unless-stopped
    networks:
      - laravel_test_app_network

networks:
  laravel_test_app_network:
    driver: bridge

volumes:
  laravel_test_app_database:
