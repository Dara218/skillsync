<VirtualHost *:80>
    DocumentRoot "/var/www/laravel-test-app/public/"
    ServerName laravel-test-app

    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php:9000/var/www/laravel-test-app/public/$1

    ErrorLog /dev/stdout
    CustomLog /dev/stdout combined
    RemoteIPHeader X-Forwarded-For

    <Directory "/var/www/laravel-test-app/">
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
